$schema: https://raw.githubusercontent.com/argoproj/argo-cd/master/api/config/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
spec:
  project: default
  source:
    path: apps/frontend
    repoURL: https://github.com/MIcQo/gitops-example.git
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
