apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applications
  namespace: argocd
spec:
  project: default
  source:
    path: apps/argocd
    repoURL: https://github.com/MIcQo/gitops-example.git
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
